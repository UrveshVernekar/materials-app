version: "3.9"

services:
  frontend:
    build: .
    container_name: nextjs_frontend
    restart: always

    command: npm run dev

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000

    dns:
      - 8.8.8.8
